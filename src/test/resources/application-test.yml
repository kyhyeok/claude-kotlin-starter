spring:
  # 통합 테스트는 Testcontainers가 PostgreSQL/Redis를 띄우고 @ServiceConnection이 URL을 주입한다.
  # docker-compose는 비활성화 (운영 compose.yaml과 충돌 방지).
  docker:
    compose:
      enabled: false

  jpa:
    hibernate:
      # Flyway가 V1을 적용한 뒤 Hibernate가 스키마를 검증만 한다 (CLAUDE.md §6).
      # create/update 사용 금지 — 운영 사고 직결.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JwtProperties 바인딩용. 운영 시크릿이 아닌 테스트 전용 32바이트 이상 값.
security:
  jwt:
    secret: test-secret-must-be-at-least-32-bytes-long-for-hs256
    access-token-ttl: PT15M
    refresh-token-ttl: P7D

logging:
  level:
    org.springframework.boot.testcontainers: INFO
    org.testcontainers: WARN
    com.github.dockerjava: WARN
