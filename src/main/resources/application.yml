spring:
  application:
    name: spring-kotlin-starter

  datasource:
    url: jdbc:postgresql://localhost:5432/starter
    username: starter
    password: starter
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      # ★ create/update 절대 금지. Flyway 단일 책임 (CLAUDE.md §6).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  docker:
    compose:
      lifecycle-management: start_only
      file: compose.yaml

security:
  jwt:
    # ★ 운영은 환경변수 JWT_SECRET (256bit 이상). 평문 commit 금지 (ADR-0004).
    secret: ${JWT_SECRET:dev-only-secret-change-me-in-production-must-be-at-least-32-bytes}
    access-token-ttl: PT15M
    refresh-token-ttl: P7D

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
