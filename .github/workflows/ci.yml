name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew ktlintCheck

      # detekt: ADR-0007에 따라 임시 제외. 재도입 시 아래 활성화.
      # - name: detekt
      #   run: ./gradlew detekt

      - name: Build & Test
        run: ./gradlew build --info
